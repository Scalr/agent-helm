name: Release charts

on:
  workflow_dispatch:

permissions: {}
jobs:
  prepare:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [agent-k8s, agent-job, agent-local]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Get chart version
        id: chart_version
        run: |
          set -euo pipefail
          chart_version="$(grep -Po "(?<=^version: ).+" charts/${{ matrix.directory }}/Chart.yaml)"
          echo "version=${chart_version}" >> $GITHUB_OUTPUT

      - name: Get changelog entry
        id: changelog_reader
        uses: mindsers/changelog-reader-action@1faaf50aa09d5793d9a100819973df801febfb31 # v2.4.0
        with:
          path: charts/${{ matrix.directory }}/CHANGELOG.md
          version: "v${{ steps.chart_version.outputs.version }}"

      - name: Create release notes
        run: |
          set -euo pipefail
          cat <<"EOF" > charts/${{ matrix.directory }}/RELEASE.md
          ${{ steps.changelog_reader.outputs.changes }}
          EOF

      - name: Upload RELEASE.md
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes-${{ matrix.directory }}
          path: charts/${{ matrix.directory }}/RELEASE.md

  release:
    permissions:
      contents: write #  to push chart release and create a release (helm/chart-releaser-action)
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download agent-k8s RELEASE.md
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes-agent-k8s
          path: charts/agent-k8s

      - name: Download agent-job RELEASE.md
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes-agent-job
          path: charts/agent-job

      - name: Download agent-local RELEASE.md
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes-agent-local
          path: charts/agent-local

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set-up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest

      - name: Install Python dependencies
        run: pip install --user pyyaml

      - name: Inject Artifact Hub annotations into Chart.yaml
        run: |
          set -euo pipefail
          for c in agent-k8s agent-job agent-local; do
            python3 scripts/changelog-to-ah.py "charts/$c"
            python3 scripts/images-to-ah.py "charts/$c"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_SKIP_EXISTING: true
          CR_MAKE_RELEASE_LATEST: false
          CR_RELEASE_NOTES_FILE: RELEASE.md

      - name: Publish artifacthub-repo.yml to gh-pages
        run: |
          set -euo pipefail
          if [ ! -f artifacthub-repo.yml ]; then
            echo "artifacthub-repo.yml not found in repo root, skipping"
            exit 0
          fi
          cp artifacthub-repo.yml /tmp/artifacthub-repo.yml
          git fetch origin gh-pages
          git worktree add gh-pages gh-pages
          cp /tmp/artifacthub-repo.yml gh-pages/artifacthub-repo.yml
          cd gh-pages
          if git diff --quiet artifacthub-repo.yml; then
            echo "artifacthub-repo.yml is already up to date on gh-pages"
            exit 0
          fi
          git add artifacthub-repo.yml
          git commit -m "Update artifacthub-repo.yml"
          git push origin gh-pages

  notify:
    name: Notify About Agent Helm Release
    needs: [prepare, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Release Succeeded
        if: ${{ needs.release.result == 'success' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "The Agent Helm has been Released",
              "attachments": [
                {
                  "color": "36a64f",
                  "fields": [
                    {
                      "title": "Job URL",
                      "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }

      - name: Release Failed
        if: ${{ contains(needs.*.result, 'failure')}}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "The Agent Helm Release has been Failed",
              "attachments": [
                {
                  "color": "b52c2a",
                  "fields": [
                    {
                      "title": "Job URL",
                      "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
