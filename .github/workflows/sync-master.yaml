name: Sync Master After Release

on:
  workflow_call:
    inputs:
      release_branch:
        description: Release branch to sync from (e.g. agent/1.0.4)
        required: true
        type: string

jobs:
  sync-master:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sudo GitHub Token
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{vars.SUDO_GHA_APP_ID}}
          installation_id: ${{vars.SUDO_GHA_APP_INSTALLATION_ID}}
          private_key: ${{secrets.SUDO_GHA_APP_PRIVATE_KEY}}

      - name: Checkout master
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup helm-docs
        uses: ./.github/actions/setup-helm-docs

      - name: Create sync branch
        id: setup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ inputs.release_branch }}
          echo "merge_base=$(git merge-base master origin/${{ inputs.release_branch }})" >> $GITHUB_OUTPUT
          git checkout -B sync/${{ inputs.release_branch }}

      - name: Sync chart files
        id: sync
        run: |
          conflicts=""
          for chart in charts/*/; do
            git checkout origin/${{ inputs.release_branch }} -- ${chart}Chart.yaml

            git show ${{ steps.setup.outputs.merge_base }}:${chart}CHANGELOG.md > /tmp/base_changelog.md
            git show origin/${{ inputs.release_branch }}:${chart}CHANGELOG.md > /tmp/released_changelog.md

            if ! git merge-file ${chart}CHANGELOG.md /tmp/base_changelog.md /tmp/released_changelog.md; then
              conflicts="${conflicts} $(basename $chart)"
            fi
          done
          echo "conflicts=${conflicts}" >> $GITHUB_OUTPUT

      - name: Regenerate READMEs
        run: helm-docs

      - name: Commit
        run: |
          git add charts/
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "Sync chart versions after ${{ inputs.release_branch }}"

      - name: Push to master
        if: steps.sync.outputs.conflicts == ''
        run: git push origin HEAD:master

      - name: Push sync branch and create PR
        id: pr
        if: steps.sync.outputs.conflicts != ''
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git push origin sync/${{ inputs.release_branch }} --force

          pr_url=$(
            gh pr create \
              --repo Scalr/agent-helm \
              --head sync/${{ inputs.release_branch }} \
              --base master \
              --title "Sync chart versions and CHANGELOG after ${{ inputs.release_branch }}" \
            || gh pr view sync/${{ inputs.release_branch }} --json url --jq '.url'
          )
          echo "url=$pr_url" >> $GITHUB_OUTPUT

      - name: Notify conflicts
        if: steps.sync.outputs.conflicts != ''
        uses: slackapi/slack-github-action@v1.25.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "text": "Syncing CHANGELOG to master failed for the ${{ inputs.release_branch }} release",
              "attachments": [
                {
                  "color": "warning",
                  "fields": [
                    {
                      "title": "PR",
                      "value": "${{ steps.pr.outputs.url }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
