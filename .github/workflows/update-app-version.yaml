name: Update appVersion

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: Scalr Agent version in format x.y.z (without `agent/` prefix).
        required: true
        type: string

jobs:
  update-app-version:
    name: Update appVersion
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Sudo GitHub Token
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{vars.SUDO_GHA_APP_ID}}
          installation_id: ${{vars.SUDO_GHA_APP_INSTALLATION_ID}}
          private_key: ${{secrets.SUDO_GHA_APP_PRIVATE_KEY}}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup helm-docs
        uses: ./.github/actions/setup-helm-docs

      - name: Main
        uses: ./.github/actions/update-app-version
        with:
          app_version: ${{inputs.app_version}}

      - name: Wait for pushed commit to be visible
        shell: bash
        run: sleep 60

      - name: Release Charts
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: release-charts.yaml

  notify:
    name: Notify About Agent Helm Release
    needs: [update-app-version]
    if: failure()
    runs-on: ubuntu-latest
    permissions: {}
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
    steps:
      - name: Release Failed
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "The Agent Helm Update App Version has been Failed",
              "attachments": [
                {
                  "color": "b52c2a",
                  "fields": [
                    {
                      "title": "Job URL",
                      "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
