{{- if not .Values.allowMetadataService }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agent-local.fullname" . }}-network-policy
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "agent-local.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agent-local.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution to kube-dns.
    # This must be explicitly allowed because ipBlock (below) only matches
    # external IPs and does not cover cluster-internal service IPs.
    - to:
      - namespaceSelector: {}
      ports:
      - port: 53
        protocol: UDP
      - port: 53
        protocol: TCP
    # Allow all external egress except the IMDS endpoint.
    # 169.254.169.254 is the link-local address used by AWS, GCP, and Azure
    # to serve instance metadata including node-level cloud credentials.
    - to:
      - ipBlock:
          cidr: 0.0.0.0/0
          except:
            - 169.254.169.254/32
{{- end }}
