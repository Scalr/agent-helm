# Default values for the Scalr Agent Helm chart.
# This is a YAML-formatted file used to configure the Scalr Agent deployment.

# -- Number of replicas for the Scalr Agent deployment. Adjust for high availability.
# @section -- Scheduling & Placement
replicaCount: 1

# -- Deployment strategy configuration.
strategy:
  # -- Type of deployment strategy. Options: RollingUpdate, Recreate.
  type: RollingUpdate
  # -- Rolling update parameters.
  rollingUpdate:
    # -- Maximum number of pods that can be created above the desired number during an update.
    maxSurge: 25%
    # -- Maximum number of pods that can be unavailable during an update.
    maxUnavailable: 50%

# -- Image pull secret to use for registry authentication.
# @section -- Image
imagePullSecrets:
  []
  # Example:
  # - name: my-registry-secret

# Image sets the repo, name and tag of the Scalr Agent image to use.
image:
  # -- Docker repository for the Scalr Agent image.
  # @section -- Image
  repository: scalr/agent
  # -- Image pull policy. 'IfNotPresent' is efficient for stable deployments.
  # @section -- Image
  pullPolicy: IfNotPresent
  # -- Image tag. Overrides the default (chart appVersion). Leave empty to use chart default.
  # @section -- Image
  tag: ""

agent:
  # -- The Scalr API endpoint URL. For tokens generated after Scalr version 8.162.0, this value
  # is optional, as the domain can be extracted from the token payload. However, it is recommended
  # to specify the URL explicitly for long-lived services to avoid issues if the account is renamed.
  # <br>Exports [`SCALR_URL`](https://docs.scalr.io/docs/configuration#scalr_url).
  # @section -- Agent
  url: ""

  # -- The agent pool token.
  # <br>Exports [`SCALR_AGENT_TOKEN`](https://docs.scalr.io/docs/configuration#scalr_agent_token).
  # @section -- Agent
  token: ""

  # -- The agent termination behaviour. Can be graceful, force or drain.
  # <br>Exports [`SCALR_AGENT_WORKER_ON_STOP_ACTION`](https://docs.scalr.io/docs/configuration#scalr_agent_worker_on_stop_action).
  # @section -- Agent
  shutdownMode: "graceful"

  # -- Pre-existing Kubernetes secret for the Scalr Agent token.
  # @section -- Agent
  tokenExistingSecret:
    # -- Name of the secret containing the token.
    # @section -- Agent
    name: ""
    # -- Key within the secret that holds the token value.
    # @section -- Agent
    key: "token"

  # -- Data directory where the agent stores workspace data (configuration versions, modules, and providers).
  # This directory must be readable, writable, and executable.
  # <br>Exports [`SCALR_AGENT_DATA_DIR`](https://docs.scalr.io/docs/configuration#scalr_agent_data_dir).
  # @section -- Agent
  dataDir: "/var/lib/scalr-agent/data"

  # -- Cache directory where the agent stores provider binaries, plugin cache, and metadata.
  # This directory must be readable, writable, and executable.
  # <br>Exports [`SCALR_AGENT_CACHE_DIR`](https://docs.scalr.io/docs/configuration#scalr_agent_cache_dir).
  # @section -- Agent
  cacheDir: "/var/lib/scalr-agent/cache"

  # -- mTLS client certificate configuration for mutual TLS authentication with Scalr.
  # <br>Exports [`SCALR_AGENT_TLS_CERT_FILE`](https://docs.scalr.io/docs/configuration#scalr_agent_tls_cert_file) and [`SCALR_AGENT_TLS_KEY_FILE`](https://docs.scalr.io/docs/configuration#scalr_agent_tls_key_file).
  # @section -- Agent.TLS
  tls:
    # -- Reference to an existing Kubernetes secret containing a CA bundle.
    # This CA bundle is mounted to the agent pod and used for outbound TLS validation (e.g., Scalr API, VCS, registries).
    # The secret must exist in the same namespace as the chart installation. If both caBundleSecret.name and caBundle
    # are set, caBundleSecret takes precedence.
    # <br>Exports [`SCALR_AGENT_CA_CERT`](https://docs.scalr.io/docs/configuration#scalr_agent_ca_cert).
    # @section -- Agent.TLS
    caBundleSecret:
      # -- Name of the Kubernetes secret containing the CA bundle.
      # Leave empty to use the inline caBundle or system certificates.
      # @section -- Agent.TLS
      name: ""
      # -- Key within the secret that contains the CA bundle file.
      # @section -- Agent.TLS
      key: "ca-bundle.crt"
    # -- Inline CA bundle content as an alternative to caBundleSecret.
    # Provide the complete CA certificate chain in PEM format. If both caBundleSecret.name and caBundle are set,
    # caBundleSecret takes precedence.
    # Example:
    # caBundle: |
    #   -----BEGIN CERTIFICATE-----
    #   MIIDXTCCAkWgAwIBAgIJAKZ...
    #   -----END CERTIFICATE-----
    #   -----BEGIN CERTIFICATE-----
    #   MIIEFzCCAv+gAwIBAgIUDiCT...
    #   -----END CERTIFICATE-----
    # @section -- Agent.TLS
    caBundle: ""
    # -- Reference to an existing Kubernetes secret containing the client certificate and private key.
    # Supports both `kubernetes.io/tls` and `Opaque` secret types. The secret must exist in the same
    # namespace as the chart installation. If both clientCertSecret.name and clientCert/clientKey
    # are set, clientCertSecret takes precedence.
    # @section -- Agent.TLS
    clientCertSecret:
      # -- Name of the Kubernetes secret containing the client certificate and key.
      # Leave empty to use inline clientCert/clientKey or to disable mTLS.
      # @section -- Agent.TLS
      name: ""
      # -- Key within the secret that contains the PEM-encoded client certificate.
      # @section -- Agent.TLS
      certKey: "tls.crt"
      # -- Key within the secret that contains the PEM-encoded private key.
      # @section -- Agent.TLS
      keyKey: "tls.key"
    # -- Inline PEM-encoded client certificate for mTLS. Creates a chart-managed secret.
    # If both clientCertSecret.name and clientCert are set, clientCertSecret takes precedence.
    # Example:
    # clientCert: |
    #   -----BEGIN CERTIFICATE-----
    #   MIIDXTCCAkWgAwIBAgIJAKZ...
    #   -----END CERTIFICATE-----
    # @section -- Agent.TLS
    clientCert: ""
    # -- Inline PEM-encoded private key for mTLS. Creates a chart-managed secret.
    # Must be provided together with clientCert.
    # Example:
    # clientKey: |
    #   -----BEGIN EC PRIVATE KEY-----
    #   MHQCAQEEIIr...
    #   -----END EC PRIVATE KEY-----
    # @section -- Agent.TLS
    clientKey: ""

# -- Additional environment variables for Scalr Agent.
# Use to configure HTTP proxies or other runtime parameters.
# @section -- Pod Configuration
extraEnv: {}

# -- Additional volumes mounted into the Scalr Agent pod.
# Use to mount extra secrets, configMaps, or other volumes alongside the chart-managed ones.
# @section -- Pod Configuration
extraVolumes:
  []
  # Example:
  # - name: extra-ca
  #   secret:
  #     secretName: my-extra-ca

# -- Additional volume mounts for the Scalr Agent container.
# Must reference volumes declared in `extraVolumes` (or other pod-level volumes).
# @section -- Pod Configuration
extraVolumeMounts:
  []
  # Example:
  # - name: extra-ca
  #   mountPath: /etc/ssl/certs/extra-ca.crt
  #   subPath: ca.crt
  #   readOnly: true

# -- Override the default resource name prefix for all resources.
nameOverride: ""

# -- Fully override the resource name for all resources.
fullnameOverride: ""

# -- Secret configuration for storing the Scalr Agent token.
# @section -- Security
secret:
  # -- Annotations for the Secret resource.
  # @section -- Security
  annotations: {}
  # -- Additional labels for the Secret resource.
  # @section -- Security
  labels: {}

# Service account configuration.
serviceAccount:
  # -- Create a Kubernetes service account for the Scalr Agent.
  # @section -- Service account
  create: false
  # -- Whether to automount the service account token in the Scalr Agent pod.
  # @section -- Service account
  automountToken: false
  # -- Annotations for the service account.
  # @section -- Service account
  annotations: {}
  # -- Additional labels for the service account.
  # @section -- Service account
  labels: {}
  # -- Name of the service account. Generated if not set and 'create' is true.
  # @section -- Service account
  name: ""

# -- Annotations for Scalr Agent pods (e.g., for monitoring or logging).
# @section -- Pod Configuration
podAnnotations: {}

# -- Security context for Scalr Agent pod.
# @section -- Security
podSecurityContext:
  # @section -- Security
  runAsNonRoot: true
  # @section -- Security
  fsGroup: 1000

# -- Security context for Scalr Agent container.
# @section -- Security
securityContext:
  # -- Run container in privileged mode. Enable only if required.
  # @section -- Security
  privileged: false
  # -- Proc mount type. Valid values: Default, Unmasked, Host.
  # @section -- Security
  procMount: Default
  # -- Restrict container capabilities for security.
  # @section -- Security
  capabilities:
    drop:
      - ALL
  # @section -- Security
  runAsNonRoot: true
  # @section -- Security
  runAsUser: 1000
  # @section -- Security
  runAsGroup: 1000

# -- Node selector for scheduling Scalr Agent pods.
# @section -- Scheduling & Placement
nodeSelector:
  {}
  # Example:
  # kubernetes.io/hostname: worker-node-1

# -- Tolerations for scheduling pods on tainted nodes.
# @section -- Scheduling & Placement
tolerations:
  []
  # Example:
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "scalr"
  #   effect: "NoSchedule"

# -- Affinity rules for pod scheduling.
# @section -- Scheduling & Placement
affinity:
  {}
  # Example:
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #   - weight: 100
  #     podAffinityTerm:
  #       labelSelector:
  #         matchLabels:
  #           app: scalr-agent
  #       topologyKey: kubernetes.io/hostname

# -- Resource limits and requests for Scalr Agent pods.
# Set identical resource limits and requests to enable Guaranteed QoS and minimize eviction risk.
# See: https://kubernetes.io/docs/concepts/workloads/pods/pod-qos/#quality-of-service-classes
# @section -- Resource Management
resources:
  limits:
    cpu: "4000m"
    memory: "2048Mi"
  requests:
    cpu: "1000m"
    memory: "1024Mi"

# Persistent storage configuration for the Scalr Agent data and cache volumes.
persistence:
  # -- Data directory storage configuration.
  # Stores workspace data including configuration versions, modules, and providers.
  # @section -- Persistence
  data:
    # -- Enable persistent storage for the data directory.
    # When false, uses emptyDir (ephemeral, recommended for most use cases as each pod gets fresh workspace).
    # When true, uses PVC (persistent across pod restarts, useful for debugging or sharing data between runs).
    # @section -- Persistence
    enabled: false

    # -- EmptyDir volume configuration (used when persistence.data.enabled is false).
    # @section -- Persistence
    emptyDir:
      # -- Size limit for the emptyDir volume.
      # @section -- Persistence
      sizeLimit: 4Gi

    # -- PersistentVolumeClaim configuration (used when persistence.data.enabled is true).
    # @section -- Persistence
    persistentVolumeClaim:
      # -- Name of an existing PVC. If empty, a new PVC named `<release-name>-data` is created.
      # @section -- Persistence
      claimName: ""
      # -- Storage class for the PVC. Leave empty to use the cluster's default storage class.
      # Set to "-" to disable dynamic provisioning and require a pre-existing PVC.
      # @section -- Persistence
      storageClassName: ""
      # -- Storage size for the PVC.
      # @section -- Persistence
      storage: 4Gi
      # -- Access mode for the PVC. Use "ReadWriteOnce" for single-replica deployments.
      # Use "ReadWriteMany" only if the Scalr Agent supports shared storage (e.g., with NFS).
      # @section -- Persistence
      accessMode: ReadWriteOnce
      # -- Optional subPath for mounting a specific subdirectory of the volume.
      # @section -- Persistence
      subPath: ""

  # -- Cache directory storage configuration.
  # Stores OpenTofu/Terraform providers, modules and binaries.
  # @section -- Persistence
  cache:
    # -- Enable persistent storage for the cache directory.
    # When false, uses emptyDir (ephemeral, providers and binaries are re-downloaded on each pod start).
    # When true, uses PVC; with ReadWriteMany the cache is shared across all agent pods.
    # @section -- Persistence
    enabled: false

    # -- EmptyDir volume configuration (used when persistence.cache.enabled is false).
    # @section -- Persistence
    emptyDir:
      # -- Size limit for the emptyDir volume.
      # @section -- Persistence
      sizeLimit: 20Gi

    # -- PersistentVolumeClaim configuration (used when persistence.cache.enabled is true).
    # @section -- Persistence
    persistentVolumeClaim:
      # -- Name of an existing PVC. If empty, a new PVC named `<release-name>-cache` is created.
      # @section -- Persistence
      claimName: ""
      # -- Storage class for the PVC. Leave empty to use the cluster's default storage class.
      # Set to "-" to disable dynamic provisioning and require a pre-existing PVC.
      # @section -- Persistence
      storageClassName: ""
      # -- Storage size for the PVC.
      # @section -- Persistence
      storage: 20Gi
      # -- Access mode for the PVC. Use "ReadWriteOnce" for single-replica deployments.
      # Use "ReadWriteMany" to share the cache across multiple agent pods (requires a compatible storage class).
      # @section -- Persistence
      accessMode: ReadWriteOnce
      # -- Optional subPath for mounting a specific subdirectory of the volume.
      # @section -- Persistence
      subPath: ""

  # -- DEPRECATED: Use `persistence.cache.enabled` instead. Kept for backward compatibility; will be removed in a future release.
  # When set to `true`, behaves as `persistence.cache.enabled: true` and emits a deprecation warning.
  # @section -- Persistence
  enabled: false

  # -- DEPRECATED: Use `persistence.cache.persistentVolumeClaim` instead. Kept for backward compatibility; will be removed in a future release.
  # When the legacy `persistence.enabled` (top-level) is `true`, these values are used for the cache PVC and a deprecation warning is emitted.
  # @section -- Persistence
  persistentVolumeClaim:
    # -- DEPRECATED: see `persistence.cache.persistentVolumeClaim.claimName`.
    # @section -- Persistence
    claimName: ""
    # -- DEPRECATED: see `persistence.cache.persistentVolumeClaim.storageClassName`.
    # @section -- Persistence
    storageClassName: ""
    # -- DEPRECATED: see `persistence.cache.persistentVolumeClaim.storage`.
    # @section -- Persistence
    storage: 20Gi
    # -- DEPRECATED: see `persistence.cache.persistentVolumeClaim.accessMode`.
    # @section -- Persistence
    accessMode: ReadWriteOnce
    # -- DEPRECATED: see `persistence.cache.persistentVolumeClaim.subPath`.
    # @section -- Persistence
    subPath: ""

# -- Termination grace period (in seconds) for pod shutdown.
# <br>Exports [`SCALR_AGENT_WORKER_GRACE_SHUTDOWN_TIMEOUT`](https://docs.scalr.io/docs/configuration#scalr_agent_worker_grace_shutdown_timeout).
# @section -- Deployment & Scaling
terminationGracePeriodSeconds: 120

# -- When set to `true` (default), disables the NetworkPolicy that blocks access to the VM metadata service (`169.254.169.254`) for agent containers.
# When set to `false`, a NetworkPolicy is created to prevent workloads from accessing cloud credentials or instance metadata.
# @section -- Security
allowMetadataService: true
